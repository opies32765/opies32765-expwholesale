<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bias Segments — Experience Wholesale</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:#0b0f19;color:#e2e8f0;min-height:100vh;padding:24px}
.wrap{max-width:1500px;margin:0 auto}
.head{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;gap:16px;flex-wrap:wrap}
.title-wrap{display:flex;align-items:center;gap:12px}
.logo-mark{display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;background:linear-gradient(135deg,#3b82f6,#1d4ed8);border-radius:8px;font-size:16px;font-weight:800;color:#fff}
.title{font-size:18px;font-weight:700;color:#f1f5f9}
.title-sub{font-size:12px;color:#64748b;margin-top:2px}
.nav{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.nav a{font-size:13px;color:#64748b;text-decoration:none;font-weight:500;padding:5px 12px;border:1px solid #1e293b;border-radius:6px}
.nav a:hover{color:#e2e8f0;border-color:#334155}
.nav a.active{color:#3b82f6;border-color:rgba(59,130,246,.4);background:rgba(59,130,246,.08)}

.summary{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.metric{background:#111827;border:1px solid #1e293b;border-radius:10px;padding:12px 16px;min-width:140px}
.metric .label{font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:.6px;font-weight:700;margin-bottom:4px}
.metric .value{font-size:22px;font-weight:700;color:#f1f5f9;font-family:'JetBrains Mono','Consolas',monospace}
.metric.actual .value{color:#4ade80}
.metric.estimate .value{color:#c084fc}
.metric.both .value{color:#fbbf24}

.controls{display:flex;gap:8px;margin-bottom:16px;align-items:center}
.chip{padding:5px 12px;border:1px solid #1e293b;border-radius:16px;background:transparent;color:#94a3b8;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit}
.chip.active{color:#3b82f6;border-color:rgba(59,130,246,.4);background:rgba(59,130,246,.08)}
.chip:hover{color:#e2e8f0;border-color:#334155}

table{width:100%;border-collapse:collapse;background:#111827;border:1px solid #1e293b;border-radius:12px;overflow:hidden;font-size:12.5px}
th{text-align:left;padding:10px 14px;font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.6px;background:#0f172a;border-bottom:1px solid #1e293b;cursor:pointer}
th.right,td.right{text-align:right}
th:hover{color:#e2e8f0}
td{padding:10px 14px;border-bottom:1px solid #1e293b;color:#e2e8f0;font-family:'JetBrains Mono','Consolas',monospace;font-size:11.5px}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(59,130,246,.04)}
td.label{font-family:'Inter',sans-serif;font-size:12.5px;font-weight:500}

.src-bar{display:inline-flex;height:14px;border-radius:3px;overflow:hidden;background:#1e293b;min-width:80px;vertical-align:middle}
.src-bar .b-actual{background:#4ade80}
.src-bar .b-estimate{background:#c084fc}
.src-label{font-size:10.5px;color:#94a3b8;margin-left:8px}

.tag{display:inline-block;font-size:9.5px;font-weight:700;padding:2px 6px;border-radius:3px;letter-spacing:.4px}
.tag.actual{background:rgba(34,197,94,.12);color:#4ade80}
.tag.estimate{background:rgba(168,85,247,.12);color:#c084fc}
.tag.mixed{background:rgba(245,158,11,.12);color:#fbbf24}

.bias-pos{color:#fbbf24}
.bias-neg{color:#93c5fd}
.bias-mute{color:#64748b}

.refresh-info{font-size:11px;color:#64748b;font-family:'JetBrains Mono','Consolas',monospace;margin-top:14px;display:flex;align-items:center;gap:8px}
.refresh-info .live-dot{width:8px;height:8px;border-radius:50%;background:#4ade80;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.empty{padding:32px;text-align:center;color:#64748b;font-size:13px}
</style>
</head>
<body>
<div class="wrap">

<div class="head">
  <div class="title-wrap">
    <div class="logo-mark">EW</div>
    <div>
      <div class="title">Bias Segments — Live Source Mix</div>
      <div class="title-sub">Per-segment correction factors · refreshes every 30 minutes</div>
    </div>
  </div>
  <div class="nav">
    <a href="/">Dashboard</a>
    <a href="/admin/ai-accuracy">AI Accuracy</a>
    <a href="/admin/bias-segments" class="active">Bias Segments</a>
    <a href="/admin/workers">Workers</a>
  </div>
</div>

<div class="summary" id="summary"></div>

<div class="controls">
  <span style="font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:.6px;font-weight:700;margin-right:6px">Window</span>
  <button class="chip active" data-window="30">30-day</button>
  <button class="chip" data-window="90">90-day</button>
  <span style="margin-left:24px;font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:.6px;font-weight:700;margin-right:6px">Filter</span>
  <button class="chip active" data-filter="all">All segments</button>
  <button class="chip" data-filter="estimate">Estimate-influenced</button>
  <button class="chip" data-filter="majority">Estimate-majority</button>
</div>

<table id="tbl">
  <thead>
    <tr>
      <th>Segment</th>
      <th class="right">n</th>
      <th>Source mix</th>
      <th class="right">Bias %</th>
      <th class="right">Actual bias %</th>
      <th class="right">Estimate bias %</th>
      <th class="right">|err| median</th>
      <th class="right">Stddev</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>

<div class="refresh-info" id="refresh-info"></div>

</div>

<script>
let state = {
  rows: [],
  window: 30,
  filter: 'all',
};

function fmtPct(v) {
  if (v === null || v === undefined) return '—';
  const cls = v > 0.5 ? 'bias-pos' : (v < -0.5 ? 'bias-neg' : 'bias-mute');
  const sign = v > 0 ? '+' : '';
  return `<span class="${cls}">${sign}${v.toFixed(2)}%</span>`;
}

function srcTag(r) {
  if (r.n_estimate > 0 && r.n_actual > 0) return '<span class="tag mixed">MIX</span>';
  if (r.n_estimate > 0) return '<span class="tag estimate">EST</span>';
  return '<span class="tag actual">ACT</span>';
}

function srcBar(r) {
  const total = (r.n_actual || 0) + (r.n_estimate || 0);
  if (total === 0) return '<span class="src-label">—</span>';
  const pctA = 100 * (r.n_actual || 0) / total;
  const pctE = 100 * (r.n_estimate || 0) / total;
  return `<span class="src-bar" style="width:80px">
    <span class="b-actual" style="width:${pctA}%"></span>
    <span class="b-estimate" style="width:${pctE}%"></span>
  </span> <span class="src-label">${r.n_actual||0}A / ${r.n_estimate||0}E</span>`;
}

function passFilter(r) {
  if (state.filter === 'all') return true;
  if (state.filter === 'estimate') return (r.n_estimate || 0) > 0;
  if (state.filter === 'majority') return (r.n_estimate || 0) > (r.n_actual || 0);
  return true;
}

function render() {
  const tbody = document.getElementById('tbody');
  const rows = state.rows.filter(passFilter);
  if (!rows.length) {
    tbody.innerHTML = '<tr><td colspan="8" class="empty">No segments match. Estimates are stored per bid — once operators start entering values, segments here will gain estimate-source rows within 30 minutes.</td></tr>';
    return;
  }
  tbody.innerHTML = rows.map(r => `
    <tr>
      <td class="label">
        ${srcTag(r)}
        <strong>${r.make}</strong> ${r.model}
        <span style="color:#64748b;font-size:11px">·
          ${r.year_band === 'any' ? 'all years' : r.year_band} ·
          ${r.mileage_band === 'any' ? 'all miles' : r.mileage_band + ' mi'}
        </span>
      </td>
      <td class="right">${r.n}</td>
      <td>${srcBar(r)}</td>
      <td class="right">${fmtPct(r.bias_pct)}</td>
      <td class="right">${fmtPct(r.bias_pct_actual)}</td>
      <td class="right">${fmtPct(r.bias_pct_estimate)}</td>
      <td class="right">${r.abs_pct !== null ? r.abs_pct.toFixed(2) + '%' : '—'}</td>
      <td class="right">${r.stddev_pct !== null ? r.stddev_pct.toFixed(2) + '%' : '—'}</td>
    </tr>
  `).join('');
}

function renderSummary(s) {
  const segWithEst = s.segments_with_estimates || 0;
  const segTotal = s.segments || 0;
  const segMaj = s.segments_estimate_majority || 0;
  document.getElementById('summary').innerHTML = `
    <div class="metric"><div class="label">Segments (${state.window}d)</div><div class="value">${segTotal}</div></div>
    <div class="metric actual"><div class="label">Actual observations</div><div class="value">${s.total_actual || 0}</div></div>
    <div class="metric estimate"><div class="label">Estimate observations</div><div class="value">${s.total_estimate || 0}</div></div>
    <div class="metric both"><div class="label">Segments w/ estimates</div><div class="value">${segWithEst} <span style="font-size:11px;color:#64748b">/ ${segTotal}</span></div></div>
    <div class="metric"><div class="label">Estimate-majority segments</div><div class="value">${segMaj}</div></div>
  `;
  document.getElementById('refresh-info').innerHTML = `
    <span class="live-dot"></span>
    Last bias_segments refresh: ${s.last_refresh ? new Date(s.last_refresh).toLocaleString() : '—'} ·
    Auto-refresh every 30 min via cron · Page polls every 60s
  `;
}

async function loadData() {
  const r = await fetch(`/api/admin/bias-segments/data?window=${state.window}`);
  const d = await r.json();
  state.rows = d.rows || [];
  renderSummary(d.summary || {});
  render();
}

document.addEventListener('click', e => {
  const c = e.target.closest('.chip');
  if (!c) return;
  if (c.dataset.window) {
    state.window = parseInt(c.dataset.window, 10);
    document.querySelectorAll('.chip[data-window]').forEach(x => x.classList.toggle('active', parseInt(x.dataset.window) === state.window));
    loadData();
  } else if (c.dataset.filter) {
    state.filter = c.dataset.filter;
    document.querySelectorAll('.chip[data-filter]').forEach(x => x.classList.toggle('active', x.dataset.filter === state.filter));
    render();
  }
});

loadData();
setInterval(loadData, 60000);
</script>
</body>
</html>
