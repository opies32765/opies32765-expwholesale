<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>EW · Voice (Pipecat)</title>
  <style>
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;height:100%;background:#0b1220;color:#e5e7eb;font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;-webkit-font-smoothing:antialiased}
    body{display:flex;flex-direction:column;min-height:100dvh}
    header{padding:18px 16px 10px;text-align:center;border-bottom:1px solid #1e293b}
    header h1{margin:0;font-size:18px;letter-spacing:.04em}
    header .sub{font-size:11px;color:#64748b;margin-top:4px;letter-spacing:.08em;text-transform:uppercase}
    main{flex:1;display:flex;flex-direction:column;padding:14px 16px;gap:12px;overflow-y:auto}
    .intro{background:#111827;border:1px solid #1f2937;border-radius:10px;padding:12px 14px;color:#cbd5e1;font-size:13.5px;line-height:1.45}
    .mic-wrap{display:flex;flex-direction:column;align-items:center;padding:16px 0 8px}
    .mic{width:120px;height:120px;border-radius:50%;background:#1d4ed8;color:#fff;border:0;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;font-weight:700;font-size:13px;letter-spacing:.04em;transition:all .15s;box-shadow:0 6px 20px rgba(29,78,216,.35)}
    .mic.connecting{background:#475569;box-shadow:none}
    .mic.connected{background:#22c55e;box-shadow:0 0 0 6px rgba(34,197,94,.18),0 6px 20px rgba(34,197,94,.35)}
    .mic.speaking{background:#f97316;animation:pulse 1.4s ease-in-out infinite}
    .mic .icon{font-size:32px;line-height:1}
    @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
    .status{text-align:center;color:#94a3b8;font-size:13px;min-height:18px}
    .messages{display:flex;flex-direction:column;gap:8px;padding:4px 0}
    .msg{padding:8px 12px;border-radius:10px;max-width:88%;word-wrap:break-word}
    .msg.user{background:#1e293b;align-self:flex-end}
    .msg.bot{background:#0f1c33;border:1px solid #1e293b;align-self:flex-start}
    .diag{background:#0f172a;border:1px solid #1e293b;border-radius:8px;padding:8px 10px;font:10.5px/1.4 ui-monospace,SFMono-Regular,Menlo,monospace;color:#94a3b8;white-space:pre-wrap;max-height:160px;overflow-y:auto}
    footer{padding:10px 14px;border-top:1px solid #1e293b;color:#64748b;font-size:10.5px;text-align:center}
  </style>
</head>
<body>
  <header>
    <h1>EW</h1>
    <div class="sub">Voice · Pipecat · ElevenLabs · build 20260522-pc2</div>
  </header>

  <main>
    <div class="intro">
      Tap once to start. Talk naturally — Anthropic-style hands-free
      conversation over WebSocket. Tap again to end.
    </div>

    <div class="mic-wrap">
      <button id="mic" class="mic" disabled>
        <div class="icon">🎙️</div>
        <div id="mic-label">LOADING…</div>
      </button>
    </div>

    <div id="status" class="status">Loading SDK…</div>
    <div id="msgs" class="messages"></div>
    <div id="diag" class="diag"></div>
  </main>

  <footer>experience-wholesale.net · WebSocket · ElevenLabs Scribe + Claude + ElevenLabs Turbo v2.5</footer>

<script type="module">
import { PipecatClient } from "https://esm.sh/@pipecat-ai/client-js@1.9.0";
import { WebSocketTransport } from "https://esm.sh/@pipecat-ai/websocket-transport@1.6.4";

const $ = (id) => document.getElementById(id);
const micBtn = $('mic');
const micLabel = $('mic-label');
const statusEl = $('status');
const msgsEl = $('msgs');
const diagEl = $('diag');

function dlog(s){
  const ts = new Date().toLocaleTimeString();
  diagEl.textContent = ts + ' ' + s + '\n' + diagEl.textContent;
  if (diagEl.textContent.length > 4000) diagEl.textContent = diagEl.textContent.slice(0, 4000);
  console.log('[ewbot-pc]', s);
}
function setStatus(s){ statusEl.textContent = s; }
function appendMsg(text, role){
  const d = document.createElement('div');
  d.className = 'msg ' + role;
  d.textContent = text;
  msgsEl.appendChild(d);
  msgsEl.scrollTop = msgsEl.scrollHeight;
  return d;
}

dlog('SDK loaded');
micBtn.disabled = false;
micLabel.textContent = 'TAP TO START';
setStatus('Ready');

const wsUrl = (location.protocol === 'https:' ? 'wss:' : 'ws:') + '//' + location.host + '/pipecat/ws';

let client = null;
let connected = false;

function buildClient(){
  const transport = new WebSocketTransport({ serverUrl: wsUrl });
  return new PipecatClient({
    transport,
    enableMic: true,
    enableCam: false,
    callbacks: {
      onConnected: () => {
        connected = true;
        micBtn.classList.remove('connecting');
        micBtn.classList.add('connected');
        micLabel.textContent = 'TAP TO END';
        setStatus('Connected — say hi');
        dlog('connected');
      },
      onDisconnected: () => {
        connected = false;
        micBtn.classList.remove('connecting','connected','speaking');
        micLabel.textContent = 'TAP TO START';
        setStatus('Disconnected');
        dlog('disconnected');
      },
      onBotStartedSpeaking: () => { micBtn.classList.add('speaking'); setStatus('EW speaking…'); },
      onBotStoppedSpeaking: () => { micBtn.classList.remove('speaking'); if (connected) setStatus('Listening…'); },
      onUserStartedSpeaking: () => { if (connected) setStatus('Listening…'); },
      onUserTranscript: (data) => {
        if (data && data.final && data.text){ appendMsg(data.text, 'user'); dlog('[user] ' + data.text.slice(0,80)); }
      },
      onBotTranscript: (data) => {
        if (data && data.text){ appendMsg(data.text, 'bot'); dlog('[bot] ' + data.text.slice(0,80)); }
      },
      onError: (err) => { dlog('error: ' + JSON.stringify(err)); setStatus('Error: ' + (err && err.message ? err.message : 'unknown')); },
    },
  });
}

micBtn.addEventListener('click', async () => {
  if (connected){
    try { await client.disconnect(); } catch(e){ dlog('disconnect err: ' + e); }
    return;
  }
  try {
    if (!client) client = buildClient();
    micBtn.classList.add('connecting');
    micLabel.textContent = 'CONNECTING…';
    setStatus('Connecting…');
    await client.connect();
  } catch(e){
    dlog('connect failed: ' + (e && e.message ? e.message : e));
    setStatus('Connect failed: ' + (e && e.message ? e.message : 'unknown'));
    micBtn.classList.remove('connecting');
    micLabel.textContent = 'TAP TO START';
  }
});

window.addEventListener('error', (e) => dlog('JS error: ' + (e.message || e)));
window.addEventListener('unhandledrejection', (e) => dlog('rejection: ' + (e.reason && e.reason.message ? e.reason.message : e.reason)));
</script>
</body>
</html>
