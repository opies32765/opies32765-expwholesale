<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Live Auctions — Experience Wholesale</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
         margin: 0; background: #0f172a; color: #e2e8f0; }
  header { padding: 14px 24px; background: #020617; color: #fff; display: flex;
           justify-content: space-between; align-items: center; border-bottom: 1px solid #1e293b; }
  header a { color: #94a3b8; text-decoration: none; font-size: 13px; }
  main { max-width: 1500px; margin: 0 auto; padding: 22px; }
  h1 { font-size: 22px; margin: 0 0 4px 0; }
  .sub { color: #64748b; font-size: 13px; margin-bottom: 18px; }
  .toolbar { display:flex; gap:10px; flex-wrap:wrap; align-items:center;
             margin-bottom: 18px; }
  .toolbar button { background:#1e293b; color:#e2e8f0; border:1px solid #334155;
                    padding:6px 12px; border-radius:6px; cursor:pointer;
                    font-size:13px; font-weight:500; }
  .toolbar button.active { background:#f59e0b; border-color:#fbbf24; color:#0f172a;
                           font-weight:700; }
  .toolbar button:hover { background:#334155; }
  .toolbar .count { color:#64748b; font-size:12px; margin-left:auto; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
          gap: 14px; }
  .tile { background:#1e293b; border:1px solid #334155; border-radius:10px;
          overflow:hidden; transition: all .15s; position:relative; }
  .tile.green  { border-color: rgba(74,222,128,.45); }
  .tile.yellow { border-color: rgba(250,204,21,.45); }
  .tile.red    { border-color: rgba(248,113,113,.35); opacity: .8; }
  .tile.gray   { border-color: rgba(148,163,184,.25); }
  .photo { width:100%; height:180px; background:#0f172a; object-fit:cover;
           display:block; }
  .body { padding: 12px 14px; }
  .title { font-size: 14px; font-weight: 600; color:#f1f5f9;
           white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .meta { font-size:11px; color:#94a3b8; margin: 2px 0 8px 0; font-family: 'SF Mono', Consolas, monospace; }
  .row-money { display:flex; justify-content:space-between;
               font-size:12px; line-height: 1.55; }
  .row-money .lbl { color:#94a3b8; }
  .row-money .val { color:#e2e8f0; font-weight: 500; }
  .opportunity { margin-top:10px; padding:8px 10px; border-radius:6px;
                 font-weight:700; font-size:13px; display:flex;
                 justify-content:space-between; align-items:center; }
  .opportunity.green  { background:rgba(74,222,128,.12);  color:#86efac; }
  .opportunity.yellow { background:rgba(250,204,21,.12);  color:#fde047; }
  .opportunity.red    { background:rgba(248,113,113,.12); color:#fca5a5; }
  .opportunity.gray   { background:rgba(148,163,184,.12); color:#cbd5e1; }
  .footer { display:flex; gap:8px; justify-content:space-between;
            margin-top:10px; align-items:center; font-size:11px;
            color:#94a3b8; }
  .timer { font-family:'SF Mono',Consolas,monospace; font-weight:600;
           color:#e2e8f0; font-size: 13px; }
  .timer.urgent { color:#fca5a5; }
  .reserve.met       { color:#86efac; }
  .reserve.not-met   { color:#fca5a5; }
  .reserve.no-reserve{ color:#fde047; }
  .bid-btn { display:inline-block; background:#f59e0b; color:#0f172a;
             padding:7px 14px; border-radius:6px; text-decoration:none;
             font-weight:700; font-size:12px; text-transform:uppercase;
             letter-spacing:.4px; }
  .bid-btn:hover { background:#fbbf24; }
  .ew-link { color:#94a3b8; text-decoration:none; font-size:11px;
             border-bottom: 1px dotted #475569; }
  .ew-link:hover { color:#cbd5e1; }
  .empty { padding: 60px; text-align:center; color:#64748b; }
  .last-update { color:#475569; font-size:11px; margin-left: 8px; }
</style>
</head>
<body>
<header>
  <div><strong style="color:#fbbf24">DealerClub</strong> <span style="color:#64748b">·</span> Live Auctions</div>
  <a href="/">← Dashboard</a>
</header>

<main>
  <h1>Live Auctions <span class="last-update" id="last-update"></span></h1>
  <div class="sub">Sorted by opportunity. Auto-refresh every 15 seconds.</div>

  <div class="toolbar">
    <button class="active" data-filter="all">All</button>
    <button data-filter="green">🟢 Green only (15%+)</button>
    <button data-filter="ending">⏱ Ending soon (&lt;30m)</button>
    <button data-filter="no-reserve">No reserve</button>
    <button data-filter="bids">Has bids</button>
    <span class="count" id="tile-count"></span>
  </div>

  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none;">No active DealerClub auctions right now.</div>
</main>

<script>
let allLots = [];
let activeFilter = 'all';

document.querySelectorAll('.toolbar button[data-filter]').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.toolbar button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    render();
  };
});

function tierFor(opp_pct) {
  if (opp_pct == null) return 'gray';
  if (opp_pct >= 15) return 'green';
  if (opp_pct >= 5)  return 'yellow';
  return 'red';
}

function fmt$(n) {
  if (n == null) return '—';
  return '$' + Number(n).toLocaleString();
}

function fmtTimer(end_iso) {
  if (!end_iso) return '—';
  const ms = new Date(end_iso) - Date.now();
  if (ms <= 0) return 'ended';
  const total_s = Math.floor(ms / 1000);
  const d = Math.floor(total_s / 86400);
  const h = Math.floor((total_s % 86400) / 3600);
  const m = Math.floor((total_s % 3600) / 60);
  const s = total_s % 60;
  if (d > 0) return `${d}d ${h}h ${m}m`;
  if (h > 0) return `${h}h ${m}m ${String(s).padStart(2,'0')}s`;
  return `${m}m ${String(s).padStart(2,'0')}s`;
}

function isUrgent(end_iso) {
  if (!end_iso) return false;
  return (new Date(end_iso) - Date.now()) < 30 * 60 * 1000;
}

function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function tileHtml(L) {
  const tier = tierFor(L.opportunity_pct);
  const oppFmt = (L.opportunity_pct == null)
    ? 'analyzing…'
    : (L.opportunity_pct >= 0 ? '+' : '') + L.opportunity_pct.toFixed(1) + '%';
  const oppDollar = (L.opportunity_gap == null) ? ''
    : (L.opportunity_gap >= 0 ? '+' : '') + '$' + Math.abs(Math.round(L.opportunity_gap)).toLocaleString();
  const photo = L.featured_image_url
    ? `<img class="photo" src="${escapeHtml(L.featured_image_url)}" alt="">`
    : `<div class="photo" style="display:flex;align-items:center;justify-content:center;color:#64748b">no photo</div>`;
  const ymm = `${L.year || ''} ${L.make || ''} ${L.model || ''}${L.trim ? ' ' + L.trim : ''}`.trim();
  const urgent = isUrgent(L.end_time);
  let rsvCls = 'reserve';
  let rsvLabel = '';
  if (L.is_no_reserve) { rsvCls += ' no-reserve'; rsvLabel = 'NO RESERVE'; }
  else if (L.reserve_met) { rsvCls += ' met'; rsvLabel = 'reserve ✓'; }
  else { rsvCls += ' not-met'; rsvLabel = 'reserve ✗'; }
  return `
    <div class="tile ${tier}">
      ${photo}
      <div class="body">
        <div class="title" title="${escapeHtml(ymm)}">${escapeHtml(ymm)}</div>
        <div class="meta">${escapeHtml(L.vin || '(no VIN)')} · ${(L.odometer || 0).toLocaleString()} mi · ${escapeHtml(L.external_id)}</div>
        <div class="row-money"><span class="lbl">Current bid:</span><span class="val">${fmt$(L.current_price)}</span></div>
        <div class="row-money"><span class="lbl">AI buy ceiling:</span><span class="val">${L.ai_price ? fmt$(L.ai_price) : '<span style="color:#64748b">analyzing…</span>'}</span></div>
        <div class="row-money"><span class="lbl">Est. all-in:</span><span class="val">${L.all_in_cost ? fmt$(L.all_in_cost) : '—'}</span></div>
        <div class="opportunity ${tier}">
          <span>${tier === 'green' ? '🟢' : tier === 'yellow' ? '🟡' : tier === 'red' ? '🔴' : '⚪'} OPPORTUNITY</span>
          <span>${oppFmt}${oppDollar ? ' (' + oppDollar + ')' : ''}</span>
        </div>
        <div class="footer">
          <div>
            <span class="timer ${urgent ? 'urgent':''}" data-end="${L.end_time || ''}">${fmtTimer(L.end_time)}</span>
            · ${L.bid_count} bids · <span class="${rsvCls}">${rsvLabel}</span>
          </div>
        </div>
        <div class="footer" style="margin-top:8px;">
          ${L.bid_id ? `<a class="ew-link" href="/bid/${L.bid_id}">EW bid #${L.bid_id}</a>` : '<span style="color:#475569">no EW link</span>'}
          <a class="bid-btn" href="${escapeHtml(L.detail_url)}" target="_blank">Bid on DealerClub ↗</a>
        </div>
      </div>
    </div>`;
}

function render() {
  let lots = allLots.slice();
  if (activeFilter === 'green') lots = lots.filter(L => tierFor(L.opportunity_pct) === 'green');
  else if (activeFilter === 'ending') lots = lots.filter(L => isUrgent(L.end_time));
  else if (activeFilter === 'no-reserve') lots = lots.filter(L => L.is_no_reserve);
  else if (activeFilter === 'bids') lots = lots.filter(L => (L.bid_count || 0) > 0);
  // Sort: opportunity desc (nulls last), then end_time asc
  lots.sort((a, b) => {
    const ao = (a.opportunity_pct == null) ? -1e9 : a.opportunity_pct;
    const bo = (b.opportunity_pct == null) ? -1e9 : b.opportunity_pct;
    if (ao !== bo) return bo - ao;
    return new Date(a.end_time||0) - new Date(b.end_time||0);
  });
  const grid = document.getElementById('grid');
  grid.innerHTML = lots.map(tileHtml).join('');
  document.getElementById('empty').style.display = lots.length === 0 ? 'block' : 'none';
  document.getElementById('tile-count').textContent =
    `${lots.length} of ${allLots.length} shown`;
}

function tickTimers() {
  document.querySelectorAll('.timer[data-end]').forEach(el => {
    const end = el.dataset.end;
    if (!end) return;
    el.textContent = fmtTimer(end);
    el.classList.toggle('urgent', isUrgent(end));
  });
}

async function refresh() {
  try {
    const r = await fetch('/api/admin/dealerclub/state', { credentials: 'same-origin' });
    if (!r.ok) return;
    const j = await r.json();
    allLots = j.lots || [];
    render();
    document.getElementById('last-update').textContent =
      'updated ' + new Date().toLocaleTimeString();
  } catch (e) {
    console.error('refresh failed', e);
  }
}

refresh();
setInterval(refresh, 15000);   // pull fresh state every 15s
setInterval(tickTimers, 1000); // tick countdown every second
</script>
</body>
</html>
