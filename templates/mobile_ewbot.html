<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>EW · Voice Valuation</title>
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:#0b1220;color:#e5e7eb;overflow:hidden}
    .wrap{display:flex;flex-direction:column;height:100dvh;padding:env(safe-area-inset-top) 16px env(safe-area-inset-bottom);max-width:560px;margin:0 auto}
    header{padding:18px 4px 8px;text-align:center}
    header h1{margin:0;font-size:22px;font-weight:700;letter-spacing:.3px}
    header .sub{margin-top:4px;font-size:12px;color:#94a3b8;letter-spacing:.4px;text-transform:uppercase}
    .scroll{flex:1;overflow-y:auto;padding:6px 0;display:flex;flex-direction:column;gap:10px}
    .msg{padding:12px 14px;border-radius:14px;line-height:1.4;font-size:15px;max-width:88%;animation:in 240ms ease-out}
    .user{align-self:flex-end;background:#1d4ed8;color:#fff;border-bottom-right-radius:4px}
    .bot {align-self:flex-start;background:#1e293b;color:#e5e7eb;border:1px solid #334155;border-bottom-left-radius:4px}
    .meta{font-size:11px;color:#64748b;margin-top:6px}
    .err {background:#3f1010;border-color:#7f1d1d;color:#fecaca}
    .pill{display:inline-block;background:#0f172a;border:1px solid #334155;border-radius:999px;padding:2px 8px;font-size:11px;margin-right:4px;color:#cbd5e1}
    .pill b{color:#fff;font-weight:700}
    @keyframes in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
    .controls{padding:10px 0 18px;display:flex;flex-direction:column;align-items:center;gap:8px}
    #status{min-height:18px;font-size:13px;color:#94a3b8;text-align:center}
    .mic{
      width:120px;height:120px;border-radius:50%;border:0;cursor:pointer;
      background:radial-gradient(circle at 30% 30%,#3b82f6,#1d4ed8);
      box-shadow:0 8px 32px rgba(59,130,246,.4),0 0 0 0 rgba(59,130,246,.5);
      color:#fff;font-size:14px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;
      transition:transform 90ms ease,box-shadow 200ms ease;
      display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px;
      touch-action:none;user-select:none;-webkit-user-select:none;
    }
    .mic:active{transform:scale(.95)}
    .mic svg{width:42px;height:42px;fill:#fff}
    .mic.listening{
      animation:pulse 1.4s ease-in-out infinite;
      background:radial-gradient(circle at 30% 30%,#ef4444,#b91c1c);
    }
    @keyframes pulse{
      0%,100%{box-shadow:0 8px 32px rgba(239,68,68,.4),0 0 0 0 rgba(239,68,68,.5)}
      50%    {box-shadow:0 8px 32px rgba(239,68,68,.6),0 0 0 16px rgba(239,68,68,0)}
    }
    .mic.thinking{
      background:radial-gradient(circle at 30% 30%,#a855f7,#7e22ce);
      animation:rot 1.8s linear infinite;
    }
    @keyframes rot{from{filter:hue-rotate(0deg)}to{filter:hue-rotate(360deg)}}
    .hint{font-size:11px;color:#64748b;text-align:center}
    .row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
    .btn{background:#1e293b;border:1px solid #334155;color:#cbd5e1;padding:8px 12px;border-radius:8px;font-size:12px;cursor:pointer}
    .btn:active{background:#0f172a}
    .typed{display:flex;gap:6px;width:100%;margin-top:6px}
    .typed input{flex:1;background:#0f172a;border:1px solid #334155;color:#e5e7eb;border-radius:8px;padding:10px;font-size:14px}
    .typed button{background:#1d4ed8;border:0;color:#fff;border-radius:8px;padding:0 14px;font-weight:600}
  </style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>EW</h1>
    <div class="sub">Voice Valuation · Beta · build {{ build_version|default('dev') }}</div>
  </header>

  <div class="scroll" id="scroll">
    <div class="msg bot">
      Hey, I'm EW. Tell me a year, make, model, and miles, and I'll get you a rough wholesale target. Tap the mic.
    </div>
  </div>

  <div class="controls">
    <button class="mic" id="micBtn" type="button">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2z"/></svg>
      <span id="micLabel">Tap to talk</span>
    </button>
    <div id="status">Ready</div>
    <div class="hint">Tap mic · speak · tap to stop (or wait for silence)</div>
    <div id="diag" style="font-family:ui-monospace,monospace;font-size:10px;color:#64748b;background:#0f172a;border:1px solid #1e293b;border-radius:6px;padding:8px;width:100%;max-height:140px;overflow:auto;white-space:pre-wrap"></div>
    <div class="typed">
      <input id="typedInput" placeholder="Or type if STT is being a pain…" autocomplete="off">
      <button id="typedSend" type="button">Send</button>
    </div>
  </div>
</div>

<script>
(function(){
  const scroll = document.getElementById('scroll');
  const micBtn = document.getElementById('micBtn');
  const micLabel = document.getElementById('micLabel');
  const statusEl = document.getElementById('status');
  const typedInput = document.getElementById('typedInput');
  const typedSend = document.getElementById('typedSend');

  const sessionId = (crypto.randomUUID && crypto.randomUUID()) || ('s_' + Math.random().toString(36).slice(2));
  let turnIndex = 0;

  function appendMsg(text, who, opts){
    const d = document.createElement('div');
    d.className = 'msg ' + (who === 'user' ? 'user' : 'bot') + (opts && opts.err ? ' err' : '');
    d.textContent = text;
    if (opts && opts.meta){
      const m = document.createElement('div'); m.className='meta'; m.innerHTML = opts.meta;
      d.appendChild(m);
    }
    scroll.appendChild(d);
    scroll.scrollTop = scroll.scrollHeight;
    return d;
  }

  function setStatus(s){ statusEl.textContent = s; }
  function setMic(state){
    micBtn.classList.remove('listening','thinking');
    if (state === 'listening'){ micBtn.classList.add('listening'); micLabel.textContent = 'Listening…'; }
    else if (state === 'thinking'){ micBtn.classList.add('thinking'); micLabel.textContent = 'Thinking…'; }
    else { micLabel.textContent = 'Tap to talk'; }
  }

  // ── TTS ────────────────────────────────────────────────
  function speak(text){
    try{
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.rate = 1.02; u.pitch = 1.0; u.volume = 1.0;
      // Pick a preferred voice if available
      const v = window.speechSynthesis.getVoices();
      const pref = v.find(x => /en[-_]US/i.test(x.lang) && /(Samantha|Google US English|Microsoft Aria)/i.test(x.name))
                 || v.find(x => /en[-_]US/i.test(x.lang))
                 || v[0];
      if (pref) u.voice = pref;
      window.speechSynthesis.speak(u);
    }catch(e){ console.warn('TTS failed:', e); }
  }

  // ── Send to backend ────────────────────────────────────
  async function send(transcript){
    if (!transcript || !transcript.trim()) return;
    appendMsg(transcript, 'user');
    setMic('thinking');
    setStatus('Thinking…');
    try{
      const r = await fetch('/api/voice/query', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ transcript: transcript, session_id: sessionId, turn_index: turnIndex }),
      });
      if (!r.ok){
        const t = await r.text();
        appendMsg('Server error: ' + r.status, 'bot', { err: true, meta: t.slice(0,140) });
        setStatus('Ready'); setMic('idle'); return;
      }
      const data = await r.json();
      const meta = data.parsed && (data.parsed.year || data.parsed.make) ?
        '<span class="pill"><b>' + (data.parsed.year||'?') + ' ' + (data.parsed.make||'?') + ' ' + (data.parsed.model||'?') + '</b></span>' +
        (data.comps_counts ? '<span class="pill">MMR <b>' + data.comps_counts.mmr + '</b></span>' +
                              '<span class="pill">Nat <b>' + data.comps_counts.national + '</b></span>' +
                              '<span class="pill">LSL <b>' + data.comps_counts.lsl + '</b></span>' : '') +
        '<span class="pill">' + data.elapsed_ms + 'ms</span>'
        : '';
      appendMsg(data.reply_text || '(no reply)', 'bot', { meta: meta });
      if (data.reply_text) speak(data.reply_text);
      turnIndex += 1;
    }catch(e){
      appendMsg('Network error: ' + e, 'bot', { err: true });
    }
    setStatus('Ready'); setMic('idle');
  }

  // ── Typed input fallback ───────────────────────────────
  typedSend.addEventListener('click', () => {
    const t = typedInput.value;
    typedInput.value = '';
    send(t);
  });
  typedInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') typedSend.click(); });

  // ── Diagnostics panel ──────────────────────────────────
  const diagEl = document.getElementById('diag');
  function dlog(s){
    const ts = new Date().toLocaleTimeString();
    diagEl.textContent = ts + ' ' + s + '\n' + diagEl.textContent;
    if (diagEl.textContent.length > 4000) diagEl.textContent = diagEl.textContent.slice(0, 4000);
    console.log('[ewbot]', s);
  }

  // ── Feature detection (visible) ────────────────────────
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const hasMR = !!window.MediaRecorder;
  const hasGUM = !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia);
  dlog('SR=' + (SR ? 'yes' : 'no') + ' MR=' + (hasMR ? 'yes' : 'no') + ' GUM=' + (hasGUM ? 'yes' : 'no') + ' UA=' + navigator.userAgent.slice(0,60));

  let rec = null, recActive = false, finalTranscript = '';
  let mediaStream = null, mediaRecorder = null, recordedChunks = [];

  // ── Path A: webkitSpeechRecognition (Chrome desktop, sometimes iOS) ─
  function initSR(){
    rec = new SR();
    rec.continuous = false;
    rec.interimResults = true;
    rec.lang = 'en-US';
    rec.onstart = () => { dlog('SR onstart'); recActive = true; finalTranscript = ''; setMic('listening'); setStatus('Listening…'); };
    rec.onresult = (e) => {
      let interim = '';
      for (let i = e.resultIndex; i < e.results.length; i++){
        const t = e.results[i][0].transcript;
        if (e.results[i].isFinal) finalTranscript += t; else interim += t;
      }
      const showing = (finalTranscript + ' ' + interim).trim();
      setStatus(showing || 'Listening…');
    };
    rec.onerror = (e) => {
      dlog('SR error: ' + (e.error || 'unknown') + ' / ' + (e.message || ''));
      setStatus('Mic error: ' + e.error);
      setMic('idle'); recActive = false;
    };
    rec.onend = () => {
      dlog('SR onend final="' + finalTranscript + '"');
      recActive = false;
      const t = finalTranscript.trim();
      if (t) send(t); else { setMic('idle'); setStatus('Ready'); }
    };
  }

  // ── Path B: MediaRecorder → server-side STT fallback ───
  // (Used when SR is missing OR SR.start() throws.) Day-2 stub:
  // for now we just record + warn — server upload endpoint lands Day 3
  // once we add OpenAI Whisper or similar. Today this just verifies
  // mic permission + recording works on iOS.
  async function startMR(){
    if (!hasMR || !hasGUM){
      dlog('MR/GUM not available — cannot record');
      setStatus('No mic API on this device');
      return false;
    }
    try {
      mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      dlog('mic permission OK');
      mediaRecorder = new MediaRecorder(mediaStream);
      recordedChunks = [];
      mediaRecorder.ondataavailable = (ev) => { if (ev.data && ev.data.size > 0) recordedChunks.push(ev.data); };
      mediaRecorder.onstop = () => {
        const blob = new Blob(recordedChunks, { type: 'audio/webm' });
        dlog('recorded ' + Math.round(blob.size/1024) + 'kb · server-STT not wired yet, use the text box');
        setStatus('Recorded ' + Math.round(blob.size/1024) + 'kb (no Whisper backend yet — type instead)');
        // Stop tracks so the red mic icon goes away in the browser bar
        mediaStream.getTracks().forEach(t => t.stop());
        mediaStream = null; mediaRecorder = null;
        setMic('idle');
      };
      mediaRecorder.start();
      recActive = true;
      setMic('listening');
      setStatus('Recording (no STT backend yet) — tap to stop');
      return true;
    } catch (e) {
      dlog('MR start failed: ' + (e && e.message ? e.message : e));
      setStatus('Mic permission denied or unavailable');
      setMic('idle');
      return false;
    }
  }

  function startRec(){
    if (recActive) return;
    try { window.speechSynthesis.cancel(); } catch(e){}
    if (SR){
      try {
        rec.start();
        dlog('SR.start() called');
        // Watchdog: if onstart doesn't fire within 800ms, assume iOS Safari
        // silent-fail and fall back to MediaRecorder so the user can at
        // least see the mic recording.
        const startedAt = Date.now();
        setTimeout(() => {
          if (!recActive && Date.now() - startedAt < 1500){
            dlog('SR onstart never fired — falling back to MediaRecorder');
            try { rec.abort(); } catch(e){}
            startMR();
          }
        }, 800);
      } catch(e){
        dlog('SR.start() threw: ' + (e && e.message ? e.message : e));
        startMR();
      }
    } else {
      startMR();
    }
  }

  function stopRec(){
    if (!recActive) return;
    if (rec){ try { rec.stop(); } catch(e){ dlog('SR.stop() threw: ' + e); } }
    if (mediaRecorder && mediaRecorder.state !== 'inactive'){
      try { mediaRecorder.stop(); } catch(e){ dlog('MR.stop() threw: ' + e); }
    }
  }

  if (SR){
    try { initSR(); dlog('SR initialized'); }
    catch(e){ dlog('SR init failed: ' + e); }
  } else {
    dlog('SR missing — will use MediaRecorder path (needs Whisper backend)');
  }

  // Single click handler (works for SR + MR paths).
  micBtn.addEventListener('click', () => {
    dlog('mic clicked · recActive=' + recActive);
    if (recActive) stopRec(); else startRec();
  });
})();
</script>
</body>
</html>
