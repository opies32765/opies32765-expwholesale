<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" content="#0b0f19">
<title>EW Owner — Sign In</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Inter',system-ui,sans-serif;background:#0b0f19;color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#111827;border:1px solid #1e293b;border-radius:16px;padding:36px 28px;width:100%;max-width:380px}
.logo{text-align:center;margin-bottom:28px}
.logo-mark{display:inline-flex;align-items:center;justify-content:center;width:52px;height:52px;background:linear-gradient(135deg,#3b82f6,#1d4ed8);border-radius:14px;font-size:22px;font-weight:800;color:#fff;margin-bottom:10px}
.logo-text{display:block;font-size:18px;font-weight:700;color:#f1f5f9}
.logo-sub{display:block;font-size:12px;color:#475569;margin-top:3px}
label{display:block;font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.6px;margin:18px 0 6px}
input{width:100%;padding:12px 14px;background:#0f172a;border:1.5px solid #1e293b;border-radius:10px;color:#e2e8f0;font-size:16px;font-family:inherit;outline:none}
input:focus{border-color:#3b82f6}
button{width:100%;padding:14px;margin-top:24px;background:linear-gradient(135deg,#3b82f6,#1d4ed8);border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
.flash{margin-top:12px;padding:10px 14px;border-radius:8px;font-size:13px;text-align:center}
.flash.error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#f87171}
.flash.success{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:#4ade80}
.fp{display:block;text-align:center;margin-top:16px;font-size:13px;color:#64748b;text-decoration:none}
.fp:hover{color:#94a3b8}
</style>
</head>
<body>
<form class="card" method="post">
  <div class="logo">
    <div class="logo-mark">EW</div>
    <span class="logo-text">Owner Portal</span>
    <span class="logo-sub">Experience Wholesale</span>
  </div>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="flash {{ cat }}">{{ msg }}</div>
    {% endfor %}
  {% endwith %}
  <label for="email">Email</label>
  <input id="email" name="email" type="email" autocomplete="username" required>
  <label for="password">Password</label>
  <input id="password" name="password" type="password" autocomplete="current-password" required>
  <button type="submit">Sign in</button>
  <a href="/owner/forgot" class="fp">Forgot password?</a>
</form>
</body>
</html>
